name: Protect Main Branch

on:
  # Runs once automatically when this workflow file first lands on main.
  # After that, re-run it manually from the Actions tab whenever you need
  # to reset or update the protection rules.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/protect-main.yml'
  workflow_dispatch:

permissions:
  administration: write

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              // No required CI checks enforced yet; add status check names here when ready
              required_status_checks: null,
              // Enforce these rules on admins too
              enforce_admins: true,
              required_pull_request_reviews: {
                dismissal_restrictions: {},
                // Invalidate approvals when new commits are pushed
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                // At least one human approval before merge
                required_approving_review_count: 1,
                require_last_push_approval: true,
              },
              // No user/team push restrictions (open to all with write access via PR)
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
            });
            core.info('✅ Branch protection applied to main');
