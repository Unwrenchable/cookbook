name: Protect Main Branch

on:
  # Runs once automatically when this workflow file first lands on main.
  # After that, re-run it manually from the Actions tab whenever you need
  # to reset or update the protection rules.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/protect-main.yml'
  workflow_dispatch:

permissions:
  administration: write

jobs:
  protect-main:
    # Guard: only apply branch protection when running on the main branch.
    # This prevents the job from running (and failing) when workflow_dispatch
    # is triggered on a PR branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'main',
                // Require the frontend type-check CI to pass before merge.
                required_status_checks: {
                  strict: false,
                  // Must match the `jobs.<id>.name` in .github/workflows/ci.yml.
                  // Job id is 'type-check'; the status check name registered by
                  // GitHub Actions is the job name: 'type-check'.
                  contexts: ['type-check'],
                },
                // Do not enforce protection on admins so the owner can
                // still merge emergency fixes without a review.
                enforce_admins: false,
                required_pull_request_reviews: {
                  dismissal_restrictions: {},
                  dismiss_stale_reviews: true,
                  require_code_owner_reviews: true,
                  required_approving_review_count: 1,
                },
                restrictions: null,
                allow_force_pushes: false,
                allow_deletions: false,
                block_creations: false,
                required_conversation_resolution: true,
                lock_branch: false,
              });
              core.info('✅ Branch protection applied to main');
            } catch (err) {
              core.setFailed(`Failed to apply branch protection: ${err.message}`);
            }
